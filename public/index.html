<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>バイト家計簿 Pro | スマホ管理</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- ログイン画面 (独立) -->
        <div id="login-screen" class="screen active">
            <div class="login-wrapper">
                <div class="login-card">
                    <div class="logo-large">✨</div>
                    <h1>バイト家計簿 Pro</h1>
                    <p>あなたのお金を、美しく管理。</p>
                    <div class="login-form">
                        <input type="text" id="username" placeholder="ユーザー名" value="admin">
                        <input type="password" id="password" placeholder="パスワード" value="admin">
                        <button id="login-btn" class="primary-btn">ログイン</button>
                        <p id="login-error" class="error-msg"></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- メインダッシュボード -->
        <div id="main-screen" class="screen">
            <header>
                <div class="header-inner">
                    <span class="logo-sm">💰 バイト家計簿 Pro</span>
                    <div class="header-actions">
                        <button id="btn-reset" class="danger-btn">リセット</button>
                        <span id="user-display" class="user-badge"></span>
                        <button id="logout-btn" class="logout-btn">ログアウト</button>
                    </div>
                </div>
            </header>

            <main class="dashboard-container">
                <!-- 1. 残高セクション (時計回り1・2番目) -->
                <div class="reveal-section section-balance">
                    <div class="balance-card cash reveal-item" style="--order: 1">
                        <span class="card-label">現金</span>
                        <h2 id="cash-balance">¥ 0</h2>
                    </div>
                    <div class="balance-card paypay reveal-item" style="--order: 2">
                        <span class="card-label">PayPay</span>
                        <h2 id="paypay-balance">¥ 0</h2>
                    </div>
                </div>

                <!-- 2. 給料ステータス (時計回り3番目) -->
                <div class="reveal-section section-status reveal-item" style="--order: 3">
                    <div class="pending-salary-info">
                        <span class="label">未受取バイト代: </span>
                        <strong id="pending-salary-value">¥ 0</strong>
                        <button id="btn-collect-salary" class="collect-btn hidden">今すぐ受け取って貯金へ</button>
                    </div>
                </div>

                <!-- 3. アクションボタン (時計回り4・5・6番目) -->
                <div class="reveal-section section-actions">
                    <button id="btn-add-expense" class="action-tile reveal-item" style="--order: 4">
                        <span class="icon">💸</span>
                        <span>支出を記録</span>
                    </button>
                    <button id="btn-add-income" class="action-tile reveal-item" style="--order: 5">
                        <span class="icon">🎁</span>
                        <span>収入を増やす</span>
                    </button>
                    <button id="btn-add-shift" class="action-tile reveal-item" style="--order: 6">
                        <span class="icon">🕒</span>
                        <span>シフトを追加</span>
                    </button>
                </div>

                <!-- 4. カレンダー (時計回り7番目) -->
                <section class="reveal-section section-calendar reveal-item" style="--order: 7">
                    <div class="calendar-card">
                        <div class="calendar-header">
                            <button id="prev-month">◀</button>
                            <h3 id="current-month-display">2024.04</h3>
                            <button id="next-month">▶</button>
                        </div>
                        <div id="calendar-grid" class="calendar-grid"></div>
                    </div>
                </section>

                <!-- 5. 分析グラフ (時計回り8番目) -->
                <section class="reveal-section section-analysis reveal-item" style="--order: 8">
                    <div class="analysis-grid">
                        <div class="chart-container card-sm">
                            <h4>支出の内訳</h4>
                            <div class="canvas-wrap"><canvas id="expense-chart"></canvas></div>
                        </div>
                        <div class="chart-container card-sm">
                            <h4>収入の内訳</h4>
                            <div class="canvas-wrap"><canvas id="income-chart"></canvas></div>
                        </div>
                    </div>
                    <button id="btn-set-init" class="init-btn-flat">初期残高を修正する</button>
                </section>
            </main>
        </div>

        <!-- 各種モーダル -->
        <div id="modal-container" class="modal-overlay">
            <div class="modal-content">
                <h3 id="modal-title">入力</h3>
                <div id="modal-body"></div>
                <div class="modal-footer">
                    <button class="btn-close">閉じる</button>
                    <button id="modal-submit-btn" class="primary-btn">保存</button>
                </div>
            </div>
        </div>

        <div id="modal-collect" class="modal-overlay">
            <div class="modal-content">
                <h3>受取先の選択</h3>
                <div class="payment-selection">
                    <label class="payment-option"><input type="radio" name="collect-method" value="cash" checked><span>現金</span></label>
                    <label class="payment-option"><input type="radio" name="collect-method" value="paypay"><span>PayPay</span></label>
                </div>
                <div class="modal-footer">
                    <button class="btn-close">閉じる</button>
                    <button id="submit-collect" class="primary-btn">受け取る</button>
                </div>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
